pipeline:
  name: "rag-recipe-physics"
  version: "1.0.0"

retrieval:
  first_stage_k: 30
  final_k: 3
  embedder_model: "sentence-transformers/all-MiniLM-L6-v2"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  normalize_embeddings: true
  batch_size: 64

llm:
  model: "qwen2.5:3b"
  generation_model: "qwen2.5:3b"
  temperature: 0.1
  num_ctx: 8192
  num_predict: 1024
  num_thread: 4

rag:
  dataset_size: 20000
  cache_dir: "../cache/rag"
  dataset_name: "nuhuibrahim/recifine"

query_parser:
  use_llm_rewrite: true
  llm_model: "qwen2.5:3b"
  max_servings: 20
  max_time_hours: 48

oven:
  model_type: "gbdt"
  features:
    - temperature
    - time
    - preheat
    - mode
    - humidity
  output:
    - delta_temp
    - delta_time

validation:
  taxonomy_config: "config/taxonomy_constraints.yaml"
  tolerance_percent: 5